<!DOCTYPE html>
<html>

<head>

<title>採用力診断</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:20px;
}

/* ===== コンテナ ===== */

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.08);
}

/* ===== ステップ ===== */

.step{
display:none;
}

.active{
display:block;
}

h2{
margin-top:0;
}

/* ===== ラジオ ===== */

.radio label{
display:block;
border:1px solid #ddd;
padding:12px;
margin-top:10px;
border-radius:6px;
cursor:pointer;
}

.radio input{
margin-right:10px;
}

/* ===== 通常ボタン ===== */

button{
margin-top:25px;
width:100%;
padding:16px;
font-size:18px;
background:#2c7be5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1f63c5;
}

/* ===== プログレス ===== */

.progress{
width:100%;
background:#eee;
height:10px;
border-radius:10px;
margin-bottom:20px;
}

.bar{
height:10px;
background:#2c7be5;
width:0%;
border-radius:10px;
}

/* ===== 入力 ===== */

input[type="text"]{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

.question{
margin-top:20px;
}

/* ===================== */
/* 🔥 固定ボタン */
/* ===================== */

.fixed-btn{
position:fixed;
z-index:999;

width:90%;
max-width:420px;

padding:18px 0;
font-size:18px;
font-weight:bold;

background:#ff7a2f;
color:white;
border:none;
border-radius:16px;

box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* 中央 */

.center-btn{
top:40%;
left:50%;
transform:translate(-50%,-50%);
}

/* 下 */

.bottom-btn{
bottom:20px;
left:50%;
transform:translate(-50%,-50%);
}

/* スマホ */

@media (max-width:600px){

.fixed-btn{
font-size:16px;
padding:14px 0;
width:92%;
}

.center-btn{
top:55%;
}

.bottom-btn{
bottom:15px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<form action="/result" method="post">

<!-- STEP0 -->

<div class="step active">

<h2>会社名を入力してください</h2>

<input type="text" name="company" required>

<button type="button" onclick="next()">次へ</button>

</div>

<!-- STEP1（省略せずそのまま使ってOK） -->

<div class="step">
<h2>STEP1 接点</h2>

<div class="question">
過去1年で求人応募はありましたか
<div class="radio">
<label><input type="radio" name="contact1" value="2">ある</label>
<label><input type="radio" name="contact1" value="1">一部ある</label>
<label><input type="radio" name="contact1" value="0">ない</label>
</div>
</div>

<button type="button" onclick="next()">次へ</button>

</div>

<!-- 👉 他STEPはそのまま流用OK -->

</form>

</div>

<!-- ===================== -->
<!-- 🔥 固定ボタン -->
<!-- ===================== -->

<form action="/diagnosis">
<button class="fixed-btn center-btn">
無料で診断する
</button>
</form>

<form action="/diagnosis">
<button class="fixed-btn bottom-btn">
診断スタート
</button>
</form>

<script>

let step=0
const steps=document.querySelectorAll(".step")
const bar=document.getElementById("bar")

function next(){

steps[step].classList.remove("active")

step++

steps[step].classList.add("active")

bar.style.width=((step)/(steps.length-1)*100)+"%"

window.scrollTo({
top:0,
behavior:"smooth"
})

}

</script>

</body>
</html>
